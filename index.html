<!DOCTYPE html>
<html>
  <head>
    <title>Gavin Carvajal</title>
  </head>
  <body>
    <h1>Gavin Carvajal</h1>

    <p><!-- Write your first paragraph here --></p>
    <p><!-- Write your second paragraph here --></p>
    <p><!-- Write your third paragraph here --></p>

    <button id="colorButton">Change Color</button>
    <button id="factButton">Tell Me a Fact</button>
    <button id="countButton">Clicked 0 times</button>

    <p id="factDisplay"></p>

    <script>
      console.log("Hello from JavaScript!");

      const button = document.querySelector("#colorButton");
      const heading = document.querySelector("h1");

      button.addEventListener("click", function () {
        heading.style.color = "navy";
      });

      // 1. An array of facts (placeholders — swap in your real ones!)
      const facts = [
        "I'm pretty decent at basketball.",
        "My favorite place to travel to is the Bahamas.",
        "My favorite food is lasagna.",
        "I go to Allen Academy.",
        "I've lived in four different cities.",
      ];

      const factButton = document.querySelector("#factButton");
      const factDisplay = document.querySelector("#factDisplay");

      factButton.addEventListener("click", function () {
        // 2. Pick a random position in the array
        const randomIndex = Math.floor(Math.random() * facts.length);
        // 3. Put that fact onto the page
        factDisplay.textContent = facts[randomIndex];
      });

      // This variable lives OUTSIDE the click function, so it survives between clicks.
      let count = 0;
      const countButton = document.querySelector("#countButton");

      countButton.addEventListener("click", function () {
        count = count + 1; // add 1 to the running total
        countButton.textContent = "Clicked " + count + " times";
      });
    </script>
  </body>
</html>
