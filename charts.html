<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Favorite Athletes — Chart</title>

  <!-- Load Chart.js from a CDN. This must come BEFORE our own script below,
       so the global `Chart` exists when we use it. -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <h1>Favorite Athletes by Jersey Number</h1>

  <!-- Chart.js draws onto this canvas. Nothing else goes inside it. -->
  <canvas id="myChart" width="600" height="400"></canvas>

  <script>
    // 1. Load the data file you already made.
    fetch("data.json")
      .then(function (response) { return response.json(); })
      .then(function (athletes) {
        // 2. Split the array of objects into two parallel arrays.
        //    .map() walks the array and returns one value per item.
        var labels = athletes.map(function (a) { return a.name; });   // ["LeBron James", ...]
        var values = athletes.map(function (a) { return a.number; }); // [23, 30, ...]

        // 3. Find the canvas and draw the chart on it.
        var canvas = document.getElementById("myChart");
        new Chart(canvas, {
          // type: which kind of chart to draw.
          type: "bar",

          // data: WHAT to draw.
          data: {
            labels: labels, // x-axis category names
            datasets: [{
              label: "Jersey Number", // dataset name (shown in legend + tooltips)
              data: values,           // the bar heights, one per label
              backgroundColor: "navy"
            }]
          },

          // options: HOW it looks and behaves.
          options: {
            responsive: true, // resize the chart when its container resizes
            plugins: {
              title: { display: true, text: "Favorite Athletes by Jersey Number" },
              legend: { display: true } // the "Jersey Number" key at the top
            },
            scales: {
              y: { beginAtZero: true } // start the y-axis at 0, not the lowest value
            }
          }
        });
      });
  </script>
</body>
</html>
